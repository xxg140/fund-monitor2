<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>基金持仓监控</title>
<link rel="stylesheet" href="样式.css?v=8">

</head>
<body>
<div class="header">
  <h1><svg class="icon-svg" viewBox="0 0 24 24"><path d="M3 3v18h18"/><path d="M7 16l4-8 4 4 4-6"/></svg> 基金持仓监控 <span class="version-tag" id="versionTag"></span></h1>
  <div class="update-time" id="updateTime">等待刷新...</div>
  <button class="btn-icon theme-toggle" id="themeToggle" onclick="toggleTheme()"><svg class="icon-svg" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg></button>
</div>
<!-- 指数/板块切换 -->
<div class="index-bar" id="indexBar">
  <div class="index-bar-tabs">
    <button class="index-bar-tab active" onclick="switchIndexBarTab('index',this)">指数</button>
    <button class="index-bar-tab" onclick="switchIndexBarTab('concept',this)">概念板块</button>
    <button class="index-bar-tab" onclick="switchIndexBarTab('industry',this)">行业板块</button>
    <div class="index-bar-indicator"></div>
  </div>
  <div class="index-bar-content">
    <div id="indexCards"></div>
    <div id="sectorPanel" style="display:none;">
      <div class="sector-header" id="sectorHeader">
        <span class="sh-name" onclick="sortSector('name')">板块名称<span class="sort-arrow"></span></span>
        <span class="sh-pct" onclick="sortSector('pct')">涨幅<span class="sort-arrow">↓</span></span>
        <span class="sh-flow" onclick="sortSector('flow')">资金流入<span class="sort-arrow"></span></span>
      </div>
      <div id="sectorList" class="sector-list"></div>
    </div>
  </div>
</div>
<!-- 操作区域 -->
<div class="action-area">
  <div id="groupBar" class="hidden">
    <div id="groupTabs" style="display:flex;gap:8px;align-items:center;flex-wrap:nowrap;"></div>
  </div>
  <button class="btn-main" onclick="spinRefreshIcon(this)"><svg class="icon-svg 图标间距" viewBox="0 0 24 24"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg> 刷新</button>
  <div class="more-wrap">
    <button class="btn-main" onclick="toggleMoreMenu()" id="moreBtn">更多</button>
    <div class="more-dropdown" id="moreDropdown">
      <div class="more-item" onclick="openImportModal();closeMoreMenu();"><svg class="icon-svg 图标间距" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> 导入基金</div>
      <div class="more-item" onclick="openGlobalOpList();closeMoreMenu();"><svg class="icon-svg 图标间距" viewBox="0 0 24 24"><path d="M16 4h2a2 2 0 012 2v14a2 2 0 01-2 2H6a2 2 0 01-2-2V6a2 2 0 012-2h2"/><rect x="8" y="2" width="8" height="4" rx="1" ry="1"/></svg> 交易记录</div>
      <div class="more-item" onclick="toggleAutoRefresh();closeMoreMenu();" id="moreAutoRefreshItem"><svg class="icon-svg 图标间距" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg> 自动刷新</div>
      <div class="more-item" onclick="openGroupModal();closeMoreMenu();"><svg class="icon-svg 图标间距" viewBox="0 0 24 24"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg> 管理分组</div>
      <div class="more-item" onclick="openSectorPanel();closeMoreMenu();"><svg class="icon-svg 图标间距" viewBox="0 0 24 24"><path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"/></svg> 关联板块</div>
      <div class="more-item" style="color:#ef4444;" onclick="clearAllFunds();closeMoreMenu();"><svg class="icon-svg 图标间距" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg> 清空列表</div>
    </div>
  </div>
</div>
<!-- 导入基金弹窗 -->
<div class="modal-overlay" id="importModal" onclick="if(event.target===this)closeImportModal()">
  <div class="modal-box">
    <div class="modal-header">
      <span>导入基金</span>
      <button class="btn-icon modal-close" onclick="closeImportModal()"><svg class="icon-svg" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div class="modal-body" style="padding:12px 16px;">
      <div class="detail-tabs" style="margin-bottom:12px;">
        <button class="btn-tab active 弹性1 居中对齐" onclick="switchImportTab('single',this)">单个导入</button>
        <button class="btn-tab 弹性1 居中对齐" onclick="switchImportTab('batch',this)">批量导入</button>
      </div>
      <div id="importSinglePanel">
        <div style="display:flex;flex-direction:column;gap:8px;">
          <input type="text" class="action-input 字号12" id="addCode" placeholder="基金代码" maxlength="6" />
          <input type="number" class="action-input 字号12" id="addAmount" placeholder="持有金额" step="0.01" min="0" />
          <input type="number" class="action-input 字号12" id="addProfit" placeholder="持有收益（可选）" step="0.01" />
          <input type="date" class="action-input 字号12" id="addPurchaseDate" />
          <input type="text" class="action-input 字号12" id="addSector" placeholder="板块名（可选）" />
          <div style="display:flex;gap:8px;align-items:center;margin-top:4px;">
            <label class="行内标签">
              <input type="checkbox" id="addIsUpdated" checked /> 已更新
            </label>
            <div class="弹性1"></div>
            <button class="btn-action" style="width:auto;" onclick="submitAddFund()">确认导入</button>
          </div>
        </div>
      </div>
      <div id="importBatchPanel" style="display:none;">
        <textarea class="batch-textarea" id="batchInput" placeholder="基金代码 持有金额 持有收益 买入日期 板块
示例：
000001 10000 500 2026-04-20 半导体"></textarea>
        <div style="display:flex;gap:8px;align-items:center;margin-top:8px;">
          <label class="行内标签">
            <input type="checkbox" id="batchIsUpdated" checked /> 已更新
          </label>
          <div class="弹性1"></div>
          <button class="btn-action" style="width:auto;" onclick="importBatchFunds()">确认导入</button>
        </div>
      </div>
    </div>
  </div>
</div>
<!-- 基金列表 -->
<div id="fundListArea">
  <div class="fund-card-wrapper">
    <div class="fund-card">
      <!-- 汇总栏 -->
      <div class="summary-bar" id="summaryBar" style="display:none;">
        <div class="summary-left">
          <div class="summary-asset-label">账户资产 <span id="hideMvBtn" class="summary-eye" onclick="toggleHideMarketVal()">👁</span></div>
          <div class="summary-asset-value flat" id="sumLocked">0</div>
        </div>
        <div class="summary-right">
          <div class="summary-today-label"><span class="updated-tag" id="sumUpdatedTag" style="display:none;">已更新</span> 当日收益</div>
          <div class="summary-today-row">
            <span class="summary-today-rate-inline" id="sumProfitTodayRate">0%</span>
            <span class="summary-today-value" id="sumProfitToday">0</span>
          </div>
        </div>
      </div>
      <!-- 分组汇总视图 -->
      <div id="groupSummaryView" style="display:none;"></div>
      <div id="fundList" class="fund-grid"></div>
    </div>
  </div>
</div>
<div id="emptyHint" style="display:none;text-align:center;padding:60px 20px;color:var(--弱化文字色);font-size:14px;">点击"更多 → 导入基金"开始监控</div>
<!-- 指数选择弹窗 -->
<div class="modal-overlay" id="indexModal" onclick="if(event.target===this)closeIndexModal()">
  <div class="modal-box">
    <div class="modal-header">
      <span>选择显示的指数（最多6个）</span>
      <button class="btn-icon modal-close" onclick="closeIndexModal()"><svg class="icon-svg" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div class="modal-body" id="indexOptions"></div>
    <div class="modal-footer">
      <button class="btn-action" onclick="resetIndexSelection()">恢复默认</button>
      <button class="btn-action" onclick="saveIndexSelection()">保存</button>
    </div>
  </div>
</div>
<!-- 确认弹窗 -->
<div class="modal-overlay" id="confirmModal" onclick="if(event.target===this)closeConfirmModal()">
  <div class="modal-box">
    <div class="modal-header">
      <span id="confirmTitle">确认操作</span>
      <button class="btn-icon modal-close" onclick="closeConfirmModal()"><svg class="icon-svg" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div class="modal-body" id="confirmBody" style="font-size:14px;color:var(--次文字色);"></div>
    <div class="modal-footer">
      <button class="btn-danger" id="confirmBtn" onclick="executeConfirm()">确认</button>
    </div>
  </div>
</div>
<!-- 分组管理弹窗 -->
<div class="modal-overlay" id="groupModal" onclick="if(event.target===this)closeGroupModal()">
  <div class="modal-box">
    <div class="modal-header">
      <span>管理分组</span>
      <button class="btn-icon modal-close" onclick="closeGroupModal()"><svg class="icon-svg" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div class="modal-body" id="groupModalBody"></div>
    <div class="modal-footer">
      <button class="btn-action" onclick="addGroup()">添加</button>
    </div>
  </div>
</div>
<!-- 全局操作记录弹窗 -->
<div class="modal-overlay" id="globalOpModal" onclick="if(event.target===this)closeGlobalOpModal()">
  <div class="modal-box">
    <div class="modal-header">
      <span>全部交易记录</span>
      <button class="btn-icon modal-close" onclick="closeGlobalOpModal()"><svg class="icon-svg" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div class="modal-body" id="globalOpModalBody" style="padding:12px 16px;max-height:60vh;overflow-y:auto;"></div>
    <div class="modal-footer" style="display:none;"></div>
  </div>
</div>
<!-- 操作弹窗 -->
<div class="modal-overlay" id="actionModal" onclick="if(event.target===this)closeActionModal()">
  <div class="modal-box">
    <div class="modal-header">
      <span id="actionModalTitle">操作</span>
      <button class="btn-icon modal-close" onclick="closeActionModal()"><svg class="icon-svg" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div class="modal-body" id="actionModalBody" style="padding:16px 20px;"></div>
  </div>
</div>
<!-- 指数详情弹窗 -->
<div class="modal-overlay" id="indexDetailModal" onclick="if(event.target===this)closeIndexDetail()">
  <div class="modal-box">
    <div class="modal-header">
      <span id="indexDetailTitle">指数详情</span>
      <div style="display:flex;align-items:center;gap:8px;">
        <button class="btn-action 字号11" onclick="closeIndexDetail();setTimeout(openIndexModal,200)">切换指数</button>
        <button class="btn-icon modal-close" onclick="closeIndexDetail()"><svg class="icon-svg" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
      </div>
    </div>
    <div class="modal-body" id="indexDetailBody" style="padding:12px 14px;">
      <!-- 基本信息栏 -->
      <div id="indexDetailInfo" style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;"></div>
      <!-- 周期切换 -->
      <div id="indexDetailTabs" style="display:flex;gap:4px;margin-bottom:8px;overflow-x:auto;"></div>
      <!-- 图表 -->
      <div style="position:relative;height:200px;border-radius:12px;background:transparent;overflow:hidden;">
        <canvas id="indexDetailCanvas" style="width:100%;height:100%;"></canvas>
      </div>
    </div>
  </div>
</div>
<!-- 关联板块弹窗 -->
<div class="modal-overlay" id="sectorModal" onclick="if(event.target===this)closeSectorPanel()">
  <div class="modal-box">
    <div class="modal-header">
      <span>关联板块</span>
      <button class="btn-icon modal-close" onclick="closeSectorPanel()"><svg class="icon-svg" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div class="sector-tabs" style="display:flex;gap:8px;padding:10px 16px;border-bottom:1px solid var(--默认边框);flex-shrink:0;align-items:center;">
      <button class="btn-tab active" onclick="switchSectorTab('single',this)">单个输入</button>
      <button class="btn-tab" onclick="switchSectorTab('batch',this)">批量导入</button>
    </div>
    <div class="modal-body" id="sectorBody" style="max-height:50vh;overflow-y:auto;"></div>
    <div class="modal-body" id="sectorBatchBody" style="max-height:50vh;overflow-y:auto;display:none;padding:12px 16px;">
      <textarea id="sectorBatchInput" class="batch-textarea" placeholder="012349 恒生科技
天弘恒生科技 半导体" style="width:100%;height:200px;"></textarea>
    </div>
    <div class="modal-footer">
      <button class="btn-action" onclick="saveSectors()">保存</button>
    </div>
  </div>
</div>
<!-- 基金详情弹窗 -->
<div class="modal-overlay" id="fundDetailModal" onclick="if(event.target===this)closeFundDetailModal()">
  <div class="modal-box">
    <div class="modal-header">
      <span id="fundDetailTitle">基金详情</span>
      <button class="btn-icon modal-close" onclick="closeFundDetailModal()"><svg class="icon-svg" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div class="modal-body" id="fundDetailBody" style="padding:0;overflow-y:auto;max-height:70vh;"></div>
  </div>
</div>
<div class="toast" id="toast"></div>
<div class="modal-overlay" id="tabSettingsModal" onclick="if(event.target===this)closeTabSettings()">
  <div id="tabSettings" class="modal-box">
    <div class="ts-title">周期排序</div>
    <div id="tsList"></div>
    <div class="ts-hint">拖拽排序</div>
    <button class="btn-action" onclick="applyTabOrder()">确定</button>
  </div>
</div>
<!-- 列设置弹窗 -->
<div class="modal-overlay" id="colSettingsModal" onclick="if(event.target===this)closeColSettings()">
  <div class="modal-box">
    <div class="modal-header">
      <span>列显示设置</span>
      <button class="btn-icon modal-close" onclick="closeColSettings()"><svg class="icon-svg" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div class="modal-body" id="colSettingsBody" style="padding:8px 16px;"></div>
    <div class="modal-footer">
      <button class="btn-action" onclick="resetColSettings()">恢复默认</button>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
<script src="工具函数.js?v=4"></script>
<script src="主逻辑.js?v=5"></script>
</body>
</html>
