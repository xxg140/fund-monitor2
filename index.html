<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"> <!-- 禁止页面缩放（特殊需求） -->
<meta name="apple-mobile-web-app-capable" content="yes"> <!-- iOS全屏模式（特殊需求） -->
<title>基金持仓监控</title>
<style>
  
  :root {
    --bg-page: #eef0f2;
    --bg-surface: #ffffff;
    --bg-surface-2: #ecedf0;
    --bg-surface-3: #d0dce9;
    --bg-hover: rgba(0,0,0,0.04);
    --bg-hover-strong: rgba(0,0,0,0.08);
    --bg-overlay: rgba(15,23,42,0.55);
    --bg-toast: #0f172a;
    --bg-danger: rgba(239,68,68,0.1);
    --text-primary: #0f172a;
    --text-secondary: #374151;
    --text-muted: #6b7280;
    --text-on-dark: #ffffff;
    --border-default: #e2e8f0;
    --border-subtle: #cbd5e1;
    --border-hover: #94a3b8;

    --accent: #6b7b8d;
    --accent-dark: #556575;
    --accent-hover: #465363;
    --accent-light: #d2dae4;
    --accent-border: #c5cdd5;
    
    --color-up: #ef4444;
    --color-up-hover: #dc2626;
    --color-up-bg: rgba(239,68,68,0.1);
    --color-down: #22c55e;
    --color-down-hover: #16a34a;
    --color-down-bg: rgba(34,197,94,0.1);

    --header-bg: linear-gradient(135deg, #e2e8f0 0%, #f1f5f9 50%, #e8edf2 100%);
    --header-text: #1e293b;
    --header-glow: rgba(30, 58, 95, 0.06);
    --header-shadow:
      1px 1px 2px rgba(0,0,0,0.06),
      2px 2px 4px rgba(0,0,0,0.08),
      4px 4px 8px rgba(0,0,0,0.1);
    --card-shadow:
      1px 1px 2px rgba(0,0,0,0.08),
      2px 2px 4px rgba(0,0,0,0.1),
      4px 4px 8px rgba(0,0,0,0.12);
  }
  body.dark {
    --bg-page: #000000;
    --bg-surface: #151d28;
    --bg-surface-2: #2c2c2e;
    --bg-surface-3: #3a3a3c;
    --bg-hover: rgba(255,255,255,0.06);
    --bg-hover-strong: rgba(255,255,255,0.1);
    --bg-overlay: rgba(0,0,0,0.7);
    --bg-toast: #0f172a;
    --bg-danger: rgba(239,68,68,0.1);
    --text-primary: #e2e8f0;
    --text-secondary: #b0bec5;
    --text-muted: #90a4ae;
    --text-on-dark: #000000;
    --border-default: #334155;
    --border-subtle: #475569;
    --border-hover: #7e92a6;

    --accent: #8a9bae;
    --accent-dark: #6b7b8d;
    --accent-hover: #556575;
    --accent-light: #273c5a;
    --accent-border: rgba(107,123,141,0.3);

    --color-up-bg: rgba(239,68,68,0.1);
    --color-down-bg: rgba(34,197,94,0.1);

    --header-bg: linear-gradient(135deg, #0f172a 0%, #1e3a5f 50%, #1e293b 100%);
    --header-text: #ffffff;
    --header-glow: rgba(255,255,255,0.06);
    --header-shadow:
      1px 1px 2px rgba(255,255,255,0.03),
      2px 2px 4px rgba(255,255,255,0.05),
      4px 4px 8px rgba(255,255,255,0.07);
    --card-shadow:
      1px 1px 2px rgba(255,255,255,0.04),
      2px 2px 4px rgba(255,255,255,0.06),
      4px 4px 8px rgba(255,255,255,0.08);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; } /* 去除移动端点击高亮 */
  html, body { touch-action: manipulation; scrollbar-width: none; -ms-overflow-style: none; } /* 去除300ms延迟 + 全局隐藏滚动条(Firefox/IE) */
  html::-webkit-scrollbar, body::-webkit-scrollbar { display: none; } /* 全局隐藏滚动条(Chrome/Safari) */
  ::-webkit-scrollbar { width: 0 !important; height: 0 !important; } /* 所有元素滚动条宽度设为0 */
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    background: var(--bg-page); color: var(--text-secondary); min-height: 100vh;
    max-width: 480px; margin: 0 auto;
    padding-bottom: 12px;
  }
  
  .header {
    background: var(--header-bg);
    padding: 16px 0 12px; color: var(--header-text);
    position: relative; overflow: hidden;
    border-radius: 12px;
    margin: 0;
    box-shadow: var(--header-shadow);
  }
  .header::before {
    content: ''; position: absolute; top: -60%; right: -10%;
    width: 280px; height: 280px; background: var(--header-glow);
    border-radius: 50%; pointer-events: none;
  }
  .header::after {
    content: ''; position: absolute; bottom: -40%; left: -5%;
    width: 200px; height: 200px; background: var(--header-glow);
    border-radius: 50%; pointer-events: none;
  }
  .header h1 { font-size: 18px; font-weight: 700; margin-bottom: 6px; letter-spacing: 0.3px; padding-left: 10px; }
  .header .update-time { font-size: 10px; opacity: 0.7; font-weight: 400; padding-left: 10px; }
  
  .index-bar {
    padding: 8px 0; display: flex; flex-direction: column; gap: 6px;
  }
  .index-bar-content { position: relative; min-height: 80px; }
  #sectorPanel { overflow: hidden; display: flex; flex-direction: column; background: var(--bg-surface); border-radius: 12px; }
  #indexCards { display: grid; grid-template-columns: repeat(3, minmax(80px, 1fr)); gap: 6px; flex: 1; }
  .index-bar-tabs { display: flex; gap: 0; margin-bottom: 4px; background: var(--bg-surface); border-radius: 12px; box-shadow: var(--card-shadow); position: relative; }
  .index-bar-tab { flex: 1; text-align: center; padding: 6px 0; font-size: 12px; background: none; border: none; cursor: pointer; color: var(--text-secondary); font-weight: 500; border-radius: 12px; }
  .index-bar-tab.active { color: var(--text-primary); background: var(--accent-light); }
  body.dark .index-bar-tabs { background: var(--bg-surface); }
  .sector-header { display: flex; align-items: center; padding: 0 6px; padding-right: 12px; font-size: 11px; color: var(--text-muted); font-weight: 600; border-bottom: 1px solid var(--border-default); cursor: pointer; user-select: none; min-height: 24px; }
  .sector-header span { color: var(--text-secondary); }
  .sector-header .sort-arrow { font-size: 10px; margin-left: 2px; }
  .sh-name { flex: 1; }
  .sh-pct { width: 60px; text-align: right; }
  .sh-flow { width: 70px; text-align: right; }
  .sector-list { overflow-y: auto; }
  .sector-list::-webkit-scrollbar { width: 6px !important; }
  .sector-list::-webkit-scrollbar-track { background: transparent !important; }
  .sector-list::-webkit-scrollbar-thumb { background: var(--border-default) !important; border-radius: 3px; }
  body.dark .sector-list::-webkit-scrollbar-thumb { background: var(--border-subtle) !important; }
  .sector-row { display: flex; align-items: center; padding: 5px 6px; font-size: 12px; border-bottom: 1px solid var(--border-subtle); }
  .sector-row:last-child { border-bottom: none; }
  .sr-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--text-primary); }
  .sr-pct { width: 60px; text-align: right; font-weight: 600; font-variant-numeric: tabular-nums; }
  .sr-flow { width: 70px; text-align: right; font-variant-numeric: tabular-nums; }
  .sr-pct.up { color: var(--color-up); }
  .sr-pct.down { color: var(--color-down); }
  .sr-pct.flat { color: var(--text-muted); }
  .sr-flow.up { color: var(--color-up); }
  .sr-flow.down { color: var(--color-down); }
  .sr-flow.flat { color: var(--text-muted); }
  .index-card {
    border-radius: 12px; padding: 8px 4px;
    text-align: center; cursor: pointer;
    border: none;
    box-shadow: var(--card-shadow); position: relative;
  }
  .index-card:active { transform: translateY(0) scale(0.98); }
  
  .index-card.border-up {
    background: radial-gradient(circle at 0% 0%, rgba(239,68,68,0.18) 0%, rgba(239,68,68,0.06) 40%, transparent 70%), var(--bg-surface);
  }
  .index-card.border-down {
    background: radial-gradient(circle at 0% 0%, rgba(34,197,94,0.18) 0%, rgba(34,197,94,0.06) 40%, transparent 70%), var(--bg-surface);
  }
  .index-card.border-flat {
    background: radial-gradient(circle at 0% 0%, rgba(148,163,184,0.10) 0%, rgba(148,163,184,0.03) 40%, transparent 70%), var(--bg-surface);
  }
  .index-name { font-size: 10px; color: var(--text-muted); margin-bottom: 4px; font-weight: 600; letter-spacing: 0.3px; height: 14px; line-height: 14px; overflow: hidden; white-space: nowrap; }
  .index-value { font-size: 15px; font-weight: 700; color: var(--text-primary); font-variant-numeric: tabular-nums; height: 20px; line-height: 20px; }
  .index-value.up { color: var(--color-up); }
  .index-value.down { color: var(--color-down); }
  .index-value.flat { color: var(--text-primary); }
  .index-change-row { font-size: 10px; margin-top: 3px; font-weight: 600; height: 14px; line-height: 14px; }
  .index-change-row.up { color: var(--color-up); }
  .index-change-row.down { color: var(--color-down); }
  .index-change-row.flat { color: var(--text-muted); }
  
  .summary-bar {
    padding: 8px 0; display: flex;
    gap: 6px;
    box-shadow: none;
  }
  .summary-item {
    flex: 1; min-width: 72px; text-align: center;
    padding: 5px 10px; border-radius: 12px;
    background: var(--bg-surface); border: none;
    display: flex; flex-direction: column; justify-content: center;
    min-height: 48px; position: relative; cursor: pointer;
    transition: transform 0.3s ease;
    box-shadow: var(--card-shadow);
  }
  .summary-item.animating { animation: cardFlip 0.4s ease; }
  @keyframes cardFlip {
    0% { transform: rotateY(0deg); }
    50% { transform: rotateY(90deg); }
    100% { transform: rotateY(0deg); }
  }
  .summary-item .label { font-size: 10px; color: var(--text-secondary); font-weight: 600; letter-spacing: 0.3px; height: 14px; line-height: 14px; margin-bottom: 2px; transition: opacity 0.2s ease; }
  .summary-item .value { font-size: 14px; font-weight: 700; font-variant-numeric: tabular-nums; height: 18px; line-height: 18px; transition: opacity 0.2s ease; }
  .value.up { color: var(--color-up); } .value.down { color: var(--color-down); } .value.flat { color: var(--text-primary); }
  .summary-profit-block { position: relative; }
  .summary-profit-block .sub-value { font-size: 10px; font-weight: 600; margin-top: 2px; opacity: 0.85; height: 14px; line-height: 14px; }
  
  #groupBar {
    display: flex;
    min-width: 0;
    flex: 1;
  }
  #groupBar.hidden {
    visibility: hidden;
  }
  .group-bar-inline {
    display: flex;
    gap: 8px;
    align-items: center;
    flex-wrap: nowrap;
  }
  #groupTabs {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    align-items: center;
  }
  .group-tab {
    padding: 6px 14px; border-radius: 12px; font-size: 12px; font-weight: 500;
    cursor: pointer; white-space: nowrap;
    border: none; background: var(--bg-surface); color: var(--text-secondary);
    display: flex; align-items: center; line-height: 1.6; box-sizing: border-box;
    box-shadow: var(--card-shadow); position: relative;
  }
  .group-tab.active {
    background: var(--accent-light);
    color: var(--text-primary);
  }
  
  .action-area {
    padding: 8px 3px;
    display: flex; flex-wrap: nowrap; gap: 8px; align-items: center;
  }
  .action-input {
    border: 1px solid var(--border-default); padding: 7px 12px; border-radius: 12px;
    font-size: 14px; outline: none; background: var(--bg-surface); color: var(--text-primary);
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .action-input:focus { outline: none; }
  .action-input::placeholder { color: var(--text-muted); }
  .action-input.code-input { width: 90px; }
  .action-input.amount-input { width: 100px; }
  .action-btn {
    padding: 6px 14px; border-radius: 12px;
    font-size: 12px; cursor: pointer; font-weight: 500;
    display: flex; align-items: center; justify-content: center;
  }
  .action-btn:focus, .action-btn:focus-visible { outline: none; }
  .btn-primary {
    background: var(--bg-surface);
    color: var(--text-secondary); border: 1px solid var(--border-hover);
  }
  .btn-secondary { background: transparent; color: var(--text-secondary); border: 1px solid var(--border-hover); transition: background 0.15s, transform 0.15s; box-shadow: var(--card-shadow); position: relative; }
  .btn-secondary:active { background: var(--accent-light); transform: scale(0.97); }
  .btn-secondary.active { background: var(--accent-light); color: var(--text-primary); }
  .btn-success { background: var(--bg-surface); color: var(--text-secondary); border: 1px solid var(--border-hover); }
  .btn-danger { background: var(--color-up-hover); color: white; border: none; }
  
  .more-wrap { position: relative; }
  .more-dropdown {
    position: absolute; top: 100%; right: 0; left: auto; margin-top: 6px;
    background: var(--bg-surface); border-radius: 12px; min-width: 180px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.12), 0 4px 12px rgba(0,0,0,0.08);
    z-index: 100; display: none; overflow: hidden;
    border: 1px solid var(--border-subtle);
  }
  .more-dropdown.active { display: block; }
  .more-item {
    padding: 11px 18px; font-size: 12px; cursor: pointer;
    border-bottom: 1px solid var(--border-default); color: var(--text-primary);
    font-weight: 500; background: var(--bg-surface);
  }
  .more-item:last-child { border-bottom: none; }
  .more-item.danger { color: var(--color-up); background: var(--color-up-bg); }
  
  .batch-textarea {
    width: 100%; min-height: 184px; padding: 10px 12px; border: 1px solid var(--border-default);
    border-radius: 12px; font-size: 12px; color: var(--text-primary); font-family: monospace; resize: vertical;
    background: var(--bg-surface); outline: none;
  }
  .batch-textarea:focus { outline: none; }
  
  .fund-grid {
    display: block;
  }
  
  .lh-row {
    display: grid; gap: 0;
  }
  .lh-row .lh-cell {
    cursor: pointer; padding: 8px 8px; line-height: 1.6;
    overflow: hidden; white-space: nowrap; text-align: left;
    font-size: 10px; color: var(--accent); font-weight: 600;
    letter-spacing: 0.3px;
    border-bottom: 1px solid var(--border-default);
    user-select: none;
  }
  
  .lh-row .lh-cell:first-child,
  .fm-name {
    position: sticky; left: 0; z-index: 1;
    background: var(--bg-surface);
  }
  .sort-arrow { font-size: 10px; margin-left: 2px; }
  .lh-sort.asc .sort-arrow::after { content: '↑'; color: var(--accent); }
  .lh-sort.desc .sort-arrow::after { content: '↓'; color: var(--accent); }
  .col-gear { cursor: pointer; font-size: 12px; opacity: 1; margin-left: 8px; vertical-align: -1px; padding: 4px; }
  
  .fund-card-wrapper {
    background: var(--bg-surface);
    border-radius: 12px;
    margin: 6px 0;
    box-shadow: var(--card-shadow);
  }
  .fund-card {
    border-radius: 12px;
    overflow-x: auto;
  }
  
  .fund-row {
    display: grid; gap: 0;
    border-bottom: 1px solid var(--border-default);
  }
  .fund-row:last-of-type { border-bottom: none; }
  .fund-row > div {
    padding: 6px 8px; white-space: nowrap;
    text-align: left; background: var(--bg-surface);
  }
  
  .fm-name { display: flex; flex-direction: column; min-width: 0; }
  .fm-fundname {
    font-weight: 600; font-size: 14px; color: var(--text-primary);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .updated-tag {
    display: inline-block;
    font-size: 10px;
    color: #2563eb;
    background: #eff6ff;
    border: 1px solid #bfdbfe;
    border-radius: 12px;
    padding: 1px 6px;
    font-weight: 500;
    line-height: 1.3;
    white-space: nowrap;
  }
  
  .fm-amount-val { font-weight: 600; font-size: 13px; color: var(--text-secondary); margin-top: 1px; }
  
  .fm-rate, .fm-today, .fm-total, .fm-dwjz, .fm-cost, .fm-shares, .fm-ratio, .fm-sector, .fm-code, .fm-gsz { display: flex; flex-direction: column; justify-content: center; }
  .fm-rate, .fm-today, .fm-total { text-align: left; }
  .fm-rate-val, .fm-total-val { font-weight: 700; font-size: 14px; }
  .fm-rate-val.up { color: var(--color-up); } .fm-rate-val.down { color: var(--color-down); }
  .fm-profit { font-size: 14px; font-weight: 700; }
  .fm-profit.up { color: var(--color-up); } .fm-profit.down { color: var(--color-down); }
  .fm-total-rate { font-size: 10px; margin-top: 1px; font-weight: 600; }
  .fm-total-rate.up { color: var(--color-up); } .fm-total-rate.down { color: var(--color-down); }
  .fm-total-val.up { color: var(--color-up); } .fm-total-val.down { color: var(--color-down); }
  .fm-dwjz-val, .fm-cost-val, .fm-shares-val, .fm-ratio-val, .fm-gsz-val, .fm-sector-val, .fm-code-val { font-size: 12px; font-weight: 500; color: var(--text-secondary); }
  
  .detail-inner { padding: 6px 2px; width: 100%; box-sizing: border-box; }
  .detail-main {
    display: flex;
    gap: 8px;
    align-items: stretch;
    flex-wrap: nowrap;
  }
  .trend-chart-wrapper {
    flex: 1 1 0;
    min-width: 0;
    width: 100%;
    position: relative;
    height: 220px;
  }
  .trend-chart { width: 100%; height: 100%; border-radius: 12px; background: transparent; display: block; }
  .chart-loading {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: transparent;
    border-radius: 12px;
    z-index: 10;
    transition: opacity 0.3s;
  }
  .chart-loading.hidden {
    opacity: 0;
    pointer-events: none;
  }
  .chart-loading-spinner {
    width: 24px;
    height: 24px;
    border: 2px solid var(--border-default);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: chart-spin 0.8s linear infinite;
  }
  @keyframes chart-spin {
    to { transform: rotate(360deg); }
  }
  body.dark .chart-loading {
    background: transparent;
  }
  body.dark .chart-loading-spinner {
    border-color: var(--text-muted);
    border-top-color: var(--accent);
  }
  .detail-controls { display: flex; flex-direction: column; gap: 6px; padding: 4px 8px; width: 100%; }
  .detail-controls .chart-tabs { display: flex; flex-direction: row; gap: 6px; flex: 1; }
  .detail-controls .chart-tab { padding: 8px 0; font-size: 12px; text-align: center; flex: 1; display: block; border: 1px solid var(--border-hover); border-radius: 12px; background: transparent; color: var(--text-secondary); cursor: pointer; font-weight: 500; box-sizing: border-box; line-height:1; }
  .chart-tab { padding: 8px 10px; font-size: 12px; border: 1px solid var(--border-hover); border-radius: 12px; background: transparent; color: var(--text-secondary); cursor: pointer; font-weight: 500; white-space: nowrap; flex-shrink: 0; min-width:44px; box-sizing: border-box; display:inline-block; line-height:1; }
  .chart-tab.active { background: var(--accent-light); color: var(--text-primary); }
  .chart-tab.gear-tab { padding:8px 8px; border:none; background:transparent; color: var(--text-muted); font-size:14px; min-width:30px; text-align:center; margin-left:auto; }
  #actionModal .chart-tab { flex: 1; text-align: center; }
  
  #tabSettings {
    padding: 16px; min-width: 260px;
  }
  #tabSettings .ts-title { font-weight:600; font-size:14px; color:var(--text-primary); margin-bottom:12px; }
  #tabSettings .ts-row, #colSettingsModal .ts-row { display:flex; align-items:center; gap:8px; padding:6px 8px; margin:0 -8px; border-radius:12px; cursor:grab; -webkit-user-select:none; user-select:none; -webkit-touch-callout:none; touch-action:none; transition:background 0.15s, transform 0.15s; }
  #tabSettings .ts-row:active, #colSettingsModal .ts-row:active { cursor:grabbing; }
  #tabSettings .ts-row .ts-drag, #colSettingsModal .ts-row .ts-drag { color:var(--text-muted); font-size:14px; cursor:grab; flex-shrink:0; }
  #tabSettings .ts-row .ts-label, #colSettingsModal .ts-row .ts-label { font-size:12px; color: var(--text-secondary); flex:1; }
  #tabSettings .ts-row.dragging, #colSettingsModal .ts-row.dragging { opacity:0.4; }
  #tabSettings .ts-row.drag-over, #colSettingsModal .ts-row.drag-over { background:var(--border-default); }
  #tabSettings .ts-ok { margin-top:12px; width:100%; padding:6px 0; border:1px solid var(--border-hover); border-radius:12px; background:transparent; color:var(--text-secondary); font-size:13px; font-weight:500; cursor:pointer; }
  #tabSettings .ts-hint, #colSettingsModal .ts-hint { font-size:11px; color:var(--text-muted); text-align:left; margin-top:6px; }
  #tabSettings-overlay { position:fixed; left:0; top:0; width:100%; height:100%; background:transparent; backdrop-filter:blur(4px); z-index:9998; display:none; }
  
  .detail-info-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 6px 0px;
    background: transparent;
    font-size: 12px;
    font-weight: 500;
    color: var(--text-muted);
  }
  .period-change {
    font-size: 12px; font-weight:500; min-width: 110px; padding-left: 0; }
  .period-change .fund-label { font-weight:500; color:var(--text-muted); }
  .period-change .fund-pct { font-weight:600; }

  .index-warning {

  .group-list-item {

  }

  .modal-overlay {

  }
  #actionModal { z-index: 2100; }

  #confirmModal { z-index: 3000; }
  body.modal-open { overflow: hidden; }
  .modal-box {
    border-radius: 16px; width: 90%; max-width: 420px;
    max-height: 80vh; overflow: hidden; display: flex; flex-direction: column;

    box-shadow: 0 12px 50px rgba(0, 0, 0, 0.4), 0 4px 20px rgba(0, 0, 0, 0.25), inset 0 1px 0 rgba(255, 255, 255, 0.6), inset 0 -1px 0 rgba(255, 255, 255, 0.15);

  }
  .modal-box::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;

  }
  .modal-box::after {
    content: ''; position: absolute; top: 0; left: 0; width: 1px; height: 100%;
    background: linear-gradient(180deg, rgba(255, 255, 255, 0.9), transparent, rgba(255, 255, 255, 0.4));
  }
  body.dark .modal-box {
    background: rgba(13, 17, 23, 0.2);
    border-color: rgba(255, 255, 255, 0.2);
    box-shadow: 0 12px 50px rgba(0, 0, 0, 0.5), 0 4px 20px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.2), inset 0 -1px 0 rgba(255, 255, 255, 0.08);
  }
  body.dark .modal-box::before {
    background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
  }
  body.dark .modal-box::after {
    background: linear-gradient(180deg, rgba(255, 255, 255, 0.3), transparent, rgba(255, 255, 255, 0.15));
  }
  .modal-header {
    padding: 16px 20px; border-bottom: 1px solid var(--border-subtle);
    font-size: 14px; font-weight: 600; display: flex; color: var(--text-primary);
    justify-content: space-between; align-items: center;
  }
  .modal-close {
    font-size: 24px; color: var(--text-primary); cursor: pointer; background: none; border: none; line-height: 1; padding: 0 4px; }
  .modal-body { padding: 16px 20px; overflow-y: auto; flex: 1; min-width: 0; width: 100%; box-sizing: border-box; }
  .form-input { width: 100%; padding: 10px 12px; font-size: 14px; border: 1px solid var(--border-default); border-radius: 12px; outline: none; background: var(--bg-surface); color: var(--text-primary); }
  /* 历史净值区域显示滚动条（特殊需求：只有板块列表和历史净值需要滚动条） */
  .tab-panel-history::-webkit-scrollbar, #historyModal .modal-body::-webkit-scrollbar { width: 6px !important; }

  .tab-panel-history::-webkit-scrollbar-thumb, #historyModal .modal-body::-webkit-scrollbar-thumb { background: var(--border-default) !important; border-radius: 3px; }

  .modal-footer {
    padding: 12px 20px; border-top: 1px solid var(--border-subtle);
    display: flex; justify-content: flex-end; gap: 8px;
  }
  
  .index-option {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 0; border-bottom: 1px solid var(--border-default); cursor: pointer;
    transition: background 0.1s;
  }
  .index-option:last-child { border-bottom: none; }
  .index-option input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; accent-color: var(--accent); }
  .index-option .io-name { font-size: 14px; flex: 1; color: var(--text-primary); font-weight: 500; }
  .index-option .io-code {
    font-size: 12px; color: var(--text-muted); }
  
  .empty-state { text-align: center; padding: 80px 20px; color: var(--text-muted); }
  .empty-state .icon { font-size: 48px; margin-bottom: 16px; opacity: 0.6; }
  .empty-state .text { font-size: 14px; font-weight: 500; }

  .icon-svg { width: 1em; height: 1em; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; vertical-align: -0.125em; }
  .icon-svg.thin { stroke-width: 1.5; }
  .icon-svg.no-fill { fill: none; }
  .empty-state .icon-svg { width: 48px; height: 48px; stroke: var(--text-muted); }
  .icon-spin { animation: spin 0.6s ease-in-out; }
  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

  .toast {
    position: fixed; bottom: 28px; left: 50%;
    transform: translateX(-50%);
    opacity: 0; visibility: hidden; pointer-events: none;
    background: var(--bg-toast); color: white; padding: 12px 24px; border-radius: 12px;
    font-size: 12px; font-weight: 500; z-index: 10000; transition: opacity 0.35s, visibility 0.35s;
    box-shadow: 0 8px 24px rgba(0,0,0,0.2);
  }
  .toast.show { opacity: 1; visibility: visible; pointer-events: auto; }
  .toast.error { background: var(--color-up); }
  .toast.success { background: var(--color-down); }
  .toast.warning { background: linear-gradient(135deg, var(--accent) 0%, var(--accent-dark) 100%); }
  .toast.info { background: linear-gradient(135deg, var(--accent) 0%, var(--accent-dark) 100%); }
  
  .val-hidden { color: var(--text-muted); letter-spacing: 2px; }
  
  .t-9 { font-size: 9px; color: var(--text-muted); }
  .t-10 { font-size: 10px; color: var(--text-muted); }
  
  body.dark { box-shadow: 0 8px 30px rgba(0,0,0,0.3); }
  body.dark .index-card.border-up {
    background: radial-gradient(circle at 0% 0%, rgba(239,68,68,0.30) 0%, rgba(239,68,68,0.08) 40%, transparent 70%), var(--bg-surface);
  }
  body.dark .index-card.border-down {
    background: radial-gradient(circle at 0% 0%, rgba(34,197,94,0.30) 0%, rgba(34,197,94,0.08) 40%, transparent 70%), var(--bg-surface);
  }
  body.dark .index-card.border-flat {
    background: radial-gradient(circle at 0% 0%, rgba(148,163,184,0.12) 0%, rgba(148,163,184,0.04) 40%, transparent 70%), var(--bg-surface);
  }
  body.dark .summary-item { background: var(--bg-surface); }
  body.dark .group-tab.active { background: var(--accent-light); color: var(--text-primary); }
  body.dark .index-bar-tab.active { background: var(--accent-light); color: var(--text-primary); }
  body.dark .chart-tab.active { background: var(--accent-light); color: var(--text-primary); }
  body.dark .btn-secondary.active { background: var(--accent-light); color: var(--text-primary); }
  body.dark .more-dropdown { box-shadow: 0 10px 40px rgba(0,0,0,0.4); }
  body.dark .updated-tag { color: #60a5fa; background: rgba(59,130,246,0.15); border-color: rgba(59,130,246,0.3); }
  body.dark .index-ref.warning { background: var(--bg-danger); border-color: rgba(239,68,68,0.3); }
  body.dark .group-list-name:focus { outline: none; }
  body.dark #indexChartInfo { background: transparent !important; border-color: #475569 !important; }
  body.dark #indexChartInfo span { color: #f1f5f9 !important; }
  body.dark #indexChartInfo #icDate { color: #ffffff !important; }
  body.dark #indexDetailBody div[style*="color:var(--text-primary)"] { color: #e2e8f0 !important; }
  #indexChartInfo div { color: var(--text-secondary); }
  #indexDetailCanvas { transition: opacity 0.5s ease; }
  #icDate { color: var(--text-secondary); }
  body.dark .chart-tooltip {
    background: var(--bg-surface-3);
    border-color: var(--text-secondary);
    color: #cbd5e1;
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
  }
  .version-tag {
    position: absolute; top: 10px; right: 16px;
    font-size: 10px; color: var(--header-text);
    opacity: 0.7;
    font-weight: 400; letter-spacing: 0.5px;
  }
  .theme-toggle {
    position: absolute; top: 50%; right: 16px; transform: translateY(-50%);
    background: transparent; border: none;
    border-radius: 12px; padding: 4px 12px; cursor: pointer;
    font-size: 20px; color: var(--header-text);
    opacity: 0.7;
  }
  body.no-theme-transition .index-card,
  body.no-theme-transition .summary-item,
  body.no-theme-transition .fund-card,
  body.no-theme-transition .group-tab,
  body.no-theme-transition .modal-box,
  body.no-theme-transition .chart-tab,
  body.no-theme-transition .action-input { transition: none !important; }
  
  .chart-tooltip {
    position: absolute;
    background: rgba(255,255,255,1);
    border: 1px solid var(--text-muted);
    border-radius: 12px;
    padding: 2px 8px;
    font-size: 12px;
    font-weight: 500;
    color: var(--text-muted);
    white-space: nowrap;
    box-shadow: 0 2px 12px rgba(0,0,0,0.15);
    width: 130px;
    text-align: center;
    visibility: hidden;
    opacity: 0;
    transition: opacity 0.15s;
    z-index: 100;
    pointer-events: none;
    top: -25px;
    left: 0;
    transform: translateX(-50%);
  }
  .chart-tooltip.visible {
    visibility: visible;
    opacity: 1;
  }
  
  .holdings-list { display: flex; flex-direction: column; }

  .holding-item .h-name { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--text-primary); font-weight: 500; }

  .holding-item .h-change.up { color: var(--color-up); }
  .holding-item .h-change.down { color: var(--color-down); }
  .holding-item .h-weight { min-width: 44px; text-align: right; color: var(--text-muted); font-size: 11px; }

  .detail-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  .tab-panel { display: none; }
  .tab-panel.active { display: block; }
  
  .history-mini-table { width: 100%; border-collapse: collapse; font-size: 11px; margin-top: 4px; }

<body>
<div class="header">
  <h1><svg class="icon-svg" viewBox="0 0 24 24"><path d="M3 3v18h18"/><path d="M7 16l4-8 4 4 4-6"/></svg> 基金持仓监控 <span class="version-tag" id="versionTag"></span></h1>
  <div class="update-time" id="updateTime">等待刷新...</div>
  <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()"><svg class="icon-svg" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg></button>
</div>
<!-- 指数/板块切换 -->
<div class="index-bar" id="indexBar">
  <div class="index-bar-tabs">
    <button class="index-bar-tab active" onclick="switchIndexBarTab('index',this)">指数</button>
    <button class="index-bar-tab" onclick="switchIndexBarTab('concept',this)">概念板块</button>
    <button class="index-bar-tab" onclick="switchIndexBarTab('industry',this)">行业板块</button>
  </div>
  <div class="index-bar-content">
    <div id="indexCards"></div>
    <div id="sectorPanel" style="display:none;">
      <div class="sector-header" id="sectorHeader">
        <span class="sh-name" onclick="sortSector('name')">板块名称<span class="sort-arrow"></span></span>
        <span class="sh-pct" onclick="sortSector('pct')">涨幅<span class="sort-arrow">↓</span></span>
        <span class="sh-flow" onclick="sortSector('flow')">资金流入<span class="sort-arrow"></span></span>
      </div>
      <div id="sectorList" class="sector-list"></div>
    </div>
  </div>
</div>
<!-- 汇总栏 -->
<div class="summary-bar" id="summaryBar" style="display:none;">
  <div class="summary-item" onclick="flipSummary('locked')" style="cursor:pointer;"><div class="label" id="lbLocked">总持仓</div><div class="value flat" id="sumLocked">0</div></div>
  <div class="summary-item" onclick="flipSummary('invest')" style="cursor:pointer;"><div class="label" id="lbInvest">实时总估值</div><div class="value flat" id="sumInvest">0</div></div>
  <div class="summary-item" onclick="flipSummary('today')" style="cursor:pointer;"><div class="label" id="lbToday">今日收益</div><div class="value" id="sumProfitToday">0</div></div>
  <div class="summary-item summary-profit-block" onclick="flipSummary('total')" style="cursor:pointer;"><div class="label" id="lbTotal">持有总收益</div><div class="value" id="sumProfitTotal">0</div><div class="value sub-value" id="sumProfitRate">0%</div></div>
</div>
<!-- 操作区域 -->
<div class="action-area">
  <div id="groupBar" class="hidden">
    <div id="groupTabs" style="display:flex;gap:8px;align-items:center;flex-wrap:nowrap;"></div>
  </div>
  <button class="action-btn group-tab" onclick="spinRefreshIcon(this)"><svg class="icon-svg" viewBox="0 0 24 24" style="margin-right:4px"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg> 刷新</button>
  <div class="more-wrap">
    <button class="action-btn group-tab" onclick="toggleMoreMenu()" id="moreBtn">更多</button>
    <div class="more-dropdown" id="moreDropdown">
      <div class="more-item" onclick="openImportModal();closeMoreMenu();"><svg class="icon-svg" viewBox="0 0 24 24" style="margin-right:4px"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> 导入基金</div>
      <div class="more-item" onclick="openGlobalOpList();closeMoreMenu();"><svg class="icon-svg" viewBox="0 0 24 24" style="margin-right:4px"><path d="M16 4h2a2 2 0 012 2v14a2 2 0 01-2 2H6a2 2 0 01-2-2V6a2 2 0 012-2h2"/><rect x="8" y="2" width="8" height="4" rx="1" ry="1"/></svg> 交易记录</div>
      <div class="more-item" onclick="toggleAutoRefresh();closeMoreMenu();" id="moreAutoRefreshItem"><svg class="icon-svg" viewBox="0 0 24 24" style="margin-right:4px"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg> 自动刷新</div>
      <div class="more-item" onclick="openGroupModal();closeMoreMenu();"><svg class="icon-svg" viewBox="0 0 24 24" style="margin-right:4px"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg> 管理分组</div>
      <div class="more-item" onclick="openSectorPanel();closeMoreMenu();"><svg class="icon-svg" viewBox="0 0 24 24" style="margin-right:4px"><path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"/></svg> 关联板块</div>
      <div class="more-item danger" onclick="clearAllFunds();closeMoreMenu();"><svg class="icon-svg" viewBox="0 0 24 24" style="margin-right:4px"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg> 清空</div>
    </div>
  </div>
</div>
<!-- 单个添加面板 -->
<!-- 导入基金弹窗 -->
<div class="modal-overlay" id="importModal" onclick="if(event.target===this)closeImportModal()">
  <div class="modal-box">
    <div class="modal-header">
      <span>导入基金</span>
      <button class="modal-close" onclick="closeImportModal()"><svg class="icon-svg" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div class="modal-body" style="padding:12px 16px;">
      <div class="detail-tabs" style="margin-bottom:12px;">
        <button class="detail-tab active" onclick="switchImportTab('single',this)">单个导入</button>
        <button class="detail-tab" onclick="switchImportTab('batch',this)">批量导入</button>
      </div>
      <div id="importSinglePanel">
        <div style="display:flex;flex-direction:column;gap:8px;">
          <input type="text" class="action-input" id="addCode" placeholder="基金代码" maxlength="6" style="font-size:12px;" />
          <input type="number" class="action-input" id="addAmount" placeholder="持有金额" step="0.01" min="0" style="font-size:12px;" />
          <input type="number" class="action-input" id="addProfit" placeholder="持有收益（可选）" step="0.01" style="font-size:12px;" />
          <input type="date" class="action-input" id="addPurchaseDate" style="font-size:12px;" />
          <input type="text" class="action-input" id="addSector" placeholder="板块名（可选）" style="font-size:12px;" />
          <div style="display:flex;gap:8px;align-items:center;margin-top:4px;">
            <label style="font-size:12px;color:var(--text-muted);display:flex;align-items:center;gap:6px;cursor:pointer;">
              <input type="checkbox" id="addIsUpdated" checked /> 已更新
            </label>
            <div style="flex:1;"></div>
            <button class="action-btn btn-success" onclick="submitAddFund()">确认导入</button>
          </div>
        </div>
      </div>
      <div id="importBatchPanel" style="display:none;">
        <textarea class="batch-textarea" id="batchInput" placeholder="基金代码 持有金额 持有收益 买入日期 板块
示例：
000001 10000 500 2026-04-20 半导体"></textarea>
        <div style="display:flex;gap:8px;align-items:center;margin-top:8px;">
          <label style="font-size:12px;color:var(--text-muted);display:flex;align-items:center;gap:6px;cursor:pointer;">
            <input type="checkbox" id="batchIsUpdated" checked /> 已更新
          </label>
          <div style="flex:1;"></div>
          <button class="action-btn btn-success" onclick="importBatchFunds()">确认导入</button>
        </div>
      </div>
    </div>
  </div>
</div>
<!-- 基金列表 -->
<div id="fundListArea">
  <div class="fund-card-wrapper">
    <div class="fund-card">
      <div id="fundList" class="fund-grid"></div>
    </div>
  </div>
</div>
<div id="emptyHint" style="display:none;text-align:center;padding:60px 20px;color:var(--text-muted);font-size:14px;">点击"更多 → 导入基金"开始监控</div>
<!-- 指数选择弹窗 -->
<div class="modal-overlay" id="indexModal" onclick="if(event.target===this)closeIndexModal()">
  <div class="modal-box">
    <div class="modal-header">
      <span>选择显示的指数（最多6个）</span>
      <button class="modal-close" onclick="closeIndexModal()"><svg class="icon-svg" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>

function loadHideMarketVal() { hideMarketVal = localStorage.getItem('fund_monitor_hide_mv') === '1'; const btn = document.getElementById('hideMvBtn'); if (btn) btn.innerHTML = hideMarketVal ? ICON_EYE_SHOW : ICON_EYE_HIDE; }

// ============ 列配置 ============
const defaultColumns = [
  { field: 'name', title: '基金名称', width: 160, fr: 160, align: 'left', sortable: true, visible: true },
  { field: 'amount', title: '实时估值', width: 105, fr: 105, align: 'left', sortable: true, visible: true },

  { field: 'gsz', title: '估算值', width: 65, fr: 65, align: 'left', sortable: false, visible: true }
];
let columns = JSON.parse(JSON.stringify(defaultColumns));
const COL_VERSION = 3;
function loadColumns() {
  try {
    const v = localStorage.getItem('fund_monitor_col_version');
    if (parseInt(v) !== COL_VERSION) {
      columns = JSON.parse(JSON.stringify(defaultColumns));
      saveColumns();
      localStorage.setItem('fund_monitor_col_version', COL_VERSION);
      return;
    }
    const s = localStorage.getItem('fund_monitor_columns');
    if (s) {
      const saved = JSON.parse(s);
      const savedFields = saved.map(c => c.field).sort().join(',');
      const defaultFields = defaultColumns.map(c => c.field).sort().join(',');
      const fieldsMatch = savedFields === defaultFields;
      if (!fieldsMatch) {
        columns = JSON.parse(JSON.stringify(defaultColumns));
        saveColumns();
        return;
      }
      saved.forEach(col => {
        const def = defaultColumns.find(c => c.field === col.field);
        if (def) { col.align = def.align; col.title = def.title; col.fr = def.fr; if (col.visible === undefined) col.visible = def.visible; }

      columns = saved;

function saveColumns() {

// 共享拖拽排序
function _initDragSort(container, rowSel, dataAttr, onReorder) {
  // 移除上次拖拽残留的监听器，防止叠加
  if (container._dragCleanup) container._dragCleanup();
  let dragIdx = -1, dragOverRow = null, _allRows = null;
  const prevent = e => e.preventDefault();
  const getRowAt = y => {
    for (const r of _allRows) { const rc = r.getBoundingClientRect(); if (y >= rc.top && y <= rc.bottom) return r; }
    return null;
  };
  const cleanup = () => {
    if (_allRows) _allRows.forEach(r => r.classList.remove('dragging', 'drag-over'));
    dragIdx = -1; dragOverRow = null; _allRows = null;
    document.removeEventListener('pointermove', onMove);
    document.removeEventListener('pointerup', onUp);
    document.removeEventListener('pointerleave', cleanup);
    container.removeEventListener('selectstart', prevent);
  };
  const onMove = e => {
    if (dragIdx === -1) return;
    e.preventDefault();
    const over = getRowAt(e.clientY);
    if (over && parseInt(over.dataset[dataAttr]) !== dragIdx && over !== dragOverRow) {
      if (dragOverRow) dragOverRow.classList.remove('drag-over');
      over.classList.add('drag-over'); dragOverRow = over;
    }
  };
  const onUp = () => {
    if (dragOverRow && dragIdx !== -1) {
      const tgt = parseInt(dragOverRow.dataset[dataAttr]);
      if (tgt !== dragIdx) onReorder(dragIdx, tgt);
    }
    cleanup();
  };
  const onDown = e => {
    const row = e.target.closest(rowSel);
    if (!row) return;
    dragIdx = parseInt(row.dataset[dataAttr]);
    _allRows = Array.from(container.querySelectorAll(rowSel));
    row.classList.add('dragging');
    container.addEventListener('selectstart', prevent);
    document.addEventListener('pointermove', onMove);
    document.addEventListener('pointerup', onUp);
    document.addEventListener('pointerleave', cleanup);
  };
  container.addEventListener('pointerdown', onDown);
  container._dragCleanup = () => { cleanup(); container.removeEventListener('pointerdown', onDown); };
}

async function calcSharesFromPurchaseDate(fund, purchaseDate, isUpdated) {
  if (!fund) return;
  await fetchFundHistory(fund.code);
  if (!fund.name) await fetchFundData(fund.code);
  fund.isQDII = !!(fund.name||'').toUpperCase().includes('QDII');
  const history = fund.history;
  if (!history || !history.length) return;
  const historyTradeDays = history.map(d => new Date(d.date + 'T00:00:00').getTime()).sort((a,b) => a - b);
  const historyLatest = historyTradeDays[historyTradeDays.length - 1];
  const purchaseTime = new Date(purchaseDate).getTime();
  // 规则一：填的日期不在净值列表里 → 强制按已更新（复选框无效）
  const inHistory = historyTradeDays.includes(purchaseTime);
  const baseOffset = inHistory ? (isUpdated ? 0 : 1) : 0;
  // 规则二：QDII多退一天，但只在填的日期 ≤ 最新净值日时叠加（数据已齐全才需要补偿）
  const qdiiOffset = (fund.isQDII && purchaseTime <= historyLatest) ? 1 : 0;
  let targetTime;
  if (inHistory) {
    let offset = baseOffset + qdiiOffset;
    targetTime = purchaseTime;
    while (offset > 0) {
      const idx = historyTradeDays.indexOf(targetTime);
      if (idx > 0) { targetTime = historyTradeDays[idx - 1]; } else break;
      offset--;
    }
  } else {
    const nearestTradeDay = historyTradeDays.filter(t => t <= purchaseTime).pop() || historyTradeDays[0];
    let offset = baseOffset + qdiiOffset;
    targetTime = nearestTradeDay;
    while (offset > 0) {
      const idx = historyTradeDays.indexOf(targetTime);
      if (idx > 0) { targetTime = historyTradeDays[idx - 1]; } else break;
      offset--;
    }
  }
  const purchaseData = history.find(d => new Date(d.date + 'T00:00:00').getTime() === targetTime);
  if (purchaseData) {
    const purchaseNav = purchaseData.value;
    const marketValBase = (fund._origMarketVal || fund.amount || 0);
    const principal = fund.amount || 0;
    fund.shares = marketValBase / purchaseNav;
    fund.cost = fund.shares > 0 ? (principal / fund.shares) : purchaseNav;
    fund.calibrateTime = purchaseNav;
    fund.purchaseDate = purchaseData.date;
  }
}

// FundBase JSONP
function fetchFundBaseFirst(code, doResolve){
  const cb='fb_first_'+code+'_'+Date.now();
  const sc=document.createElement('script');
  const t=setTimeout(()=>{cleanup();console.warn(`[FundBase超时] ${code}`);doResolve(null);},JSONP_TIMEOUT);
  function cleanup(){clearTimeout(t);delete window[cb];if(sc.parentNode)sc.parentNode.removeChild(sc);}
  window[cb]=resp=>{
    try{
      if(!resp||!resp.Datas){ doResolve(null); return; }
      const d=resp.Datas;
      const f=funds.find(x=>x.code===code);
      if(!f){doResolve(null);return;}
      let valData=null;
      if(d.Valuation){ try{valData=JSON.parse(d.Valuation);}catch(e){} }
      if(valData && valData.dwjz && parseFloat(valData.dwjz)>0){
        f._valuationDwjz=String(valData.dwjz);
      }
      if(valData && valData.jzrq){
        f._valuationJzrq=String(valData.jzrq);
      }
      const latestNav=d.DWJZ; const latestDate=d.FSRQ; const latestChange=d.RZDF;
      if(d.SHORTNAME) f.name=d.SHORTNAME;
      const isQDII = (f.name||'').toUpperCase().includes('QDII');
      if(isQDII) f.isQDII=true; else delete f.isQDII;
      if(valData && valData.dwjz && parseFloat(valData.dwjz)>0){
        f._prevDwjz=String(valData.dwjz);
      } else {
        const oldDwjz=parseFloat(f.dwjz)||0;
        if(oldDwjz>0) f._prevDwjz=String(oldDwjz);
      }
      f.dwjz=latestNav; f.jzrq=latestDate;
      if(valData && valData.gsz && parseFloat(valData.gsz)>0){
        f.gsz=valData.gsz; f.gszzl=valData.gszzl||'0'; f.gztime=valData.gztime||'';
      } else {
        if(latestChange!==undefined&&latestChange!=='') f.gszzl=String(latestChange);
        f.gsz=latestNav; f.gztime=latestDate;
      }
      if(f.totalProfit!==null && f.calibrateTime===null) f.calibrateTime=parseFloat(f.dwjz)||null;
      doResolve({fundcode:code});
    }catch(e){ doResolve(null); }finally{ cleanup(); }
  };
  sc.src=`https://fundmobapi.eastmoney.com/FundMApi/FundBase.ashx?FCODE=${code}&deviceid=1&plat=Iphone&product=EFund&version=6.3.5&callback=${cb}`;
  sc.onerror=()=>{ cleanup(); doResolve(null); };
  document.head.appendChild(sc);
}

const fundIndexMap={ '161725':'sz399997', '001186':'sz399006' };
function fetchIndexQuote(indexCode){
  return new Promise(resolve=>{
    const xhr=new XMLHttpRequest();
    xhr.open('GET',`https://qt.gtimg.cn/q=${indexCode}`,true);
    xhr.onerror=()=>resolve(null); xhr.timeout = XHR_TIMEOUT; xhr.ontimeout=()=>resolve(null);
    xhr.onload=()=>{
      if(xhr.status!==200){resolve(null);return;}
      const txt=xhr.responseText||''; const m=txt.match(/"([^"]+)"/);
      if(!m){resolve(null);return;}
      const parts=m[1].split('~');
      if(!parts||parts.length<6){resolve(null);return;}
      const name=parts[1]||''; const latest=parseFloat(parts[3])||0; const prev=parseFloat(parts[4])||0;
      const change=prev>0?((latest-prev)/prev*100).toFixed(2):'0.00';
      resolve({name,latest,prev,change});
    };
    xhr.send();
  });
}

// ====== 历史净值：pingzhongdata 全量数据（与 real-time-fund 一致，一次请求，无需分页） ======
const HISTORY_CACHE_KEY = 'fund_history_cache_v2';
const HISTORY_CACHE_TTL = 60 * 60 * 1000;
const HISTORY_STALE_TTL = 10 * 60 * 1000;
const HISTORY_CACHE_MAX = 50; // LRU max entries
function _readHistoryCache() {
  return safeGet(HISTORY_CACHE_KEY, {});
}
function getHistoryCache(code) {
  const entry = _readHistoryCache()[code];
  if (entry && Date.now() - entry.ts < HISTORY_CACHE_TTL) return entry.data;
  return null;
}
function getHistoryCacheStale(code) {
  const entry = _readHistoryCache()[code];
  return entry ? { data: entry.data, ts: entry.ts } : null;
}
function setHistoryCache(code, data) {
  try {
    const cache = _readHistoryCache();
    cache[code] = { ts: Date.now(), data };
    // LRU eviction: keep only the most recent HISTORY_CACHE_MAX entries
    const keys = Object.keys(cache);
    if (keys.length > HISTORY_CACHE_MAX) {
      keys.sort((a, b) => cache[a].ts - cache[b].ts);
      for (let i = 0; i < keys.length - HISTORY_CACHE_MAX; i++) delete cache[keys[i]];
    }
    safeSet(HISTORY_CACHE_KEY, cache);
  } catch (e) {}
}
// 后台刷新防重
const _histRefreshing = new Set();
// 一次 JSONP 请求获取基金全部历史净值（pingzhongdata/{code}.js）
function _doFetchHistory(code){
  return new Promise(resolve => {
    const sc = document.createElement('script');
    const t = setTimeout(() => { cleanup(); resolve(null); }, JSONP_TIMEOUT);
    function cleanup() {
      clearTimeout(t);
      if (sc.parentNode) sc.parentNode.removeChild(sc);
    }
    sc.onload = () => {
      try {
        const trend = window.Data_netWorthTrend;
        if (!Array.isArray(trend) || !trend.length) { resolve(null); return; }
        const now = new Date();
        const endMs = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 23, 59, 59, 999).getTime();
        const history = trend
          .filter(d => d && typeof d.x === 'number' && Number.isFinite(Number(d.y)) && d.x <= endMs)
          .sort((a, b) => a.x - b.x)
          .map(d => {
            const dt = new Date(Number(d.x));
            const date = formatDate(dt);
            return { date, value: Number(d.y) };
          });
        resolve(history.length ? history : null);
      } catch (e) { resolve(null); } finally { cleanup(); }
    };
    sc.onerror = () => { cleanup(); resolve(null); };
    sc.src = `https://fund.eastmoney.com/pingzhongdata/${code}.js?v=${Date.now()}`;
    document.head.appendChild(sc);
  });
}
// JSONP 脚本注入（用于东方财富 F10 / FundArchives 接口，返回 window.apidata）
function _runF10Script(url, timeoutMs = 10000) {
  return new Promise((resolve) => {
    const script = document.createElement('script');
    script.src = url;
    script.async = true;
    let done = false;
    const cleanup = () => {
      done = true;
      if (timer) clearTimeout(timer);
      if (document.body.contains(script)) document.body.removeChild(script);
    };
    const timer = setTimeout(() => {
      if (done) return;
      cleanup();
      resolve({ ok: false, error: '请求超时' });
    }, timeoutMs);
    script.onload = () => {
      if (done) return;
      cleanup();
      let apidata;
      try { apidata = window?.apidata ? JSON.parse(JSON.stringify(window.apidata)) : undefined; }
      catch (e) { apidata = window?.apidata; }
      resolve({ ok: true, apidata });
    };
    script.onerror = () => {
      if (done) return;
      cleanup();
      resolve({ ok: false, error: '数据加载失败' });
    };
    document.body.appendChild(script);
  });
}
async function fetchFundHistory(code){
  const f = funds.find(x => x.code === code);
  if (f && f.history) return f.history;
  const stale = getHistoryCacheStale(code);
  if (stale) {
    if (f) f.history = stale.data;
    if (Date.now() - stale.ts >= HISTORY_STALE_TTL && !_histRefreshing.has(code)) {
      _histRefreshing.add(code);
      _doFetchHistory(code).then(newData => {
        if (newData) {
          const f2 = funds.find(x => x.code === code);
          if (f2) f2.history = newData;
          setHistoryCache(code, newData);
          const canvas = document.querySelector('#fundDetailModal .trend-chart');
          if (canvas && expandedCode === code) {
            canvas._history = newData;
            const period = parseInt(canvas.dataset.period) || 90;
            const costNav = _costNav(f2);
            canvas._chart = updateTrendChart(canvas, newData, period, costNav);
          }
          const historyPanel = document.querySelector('#fundDetailModal .tab-panel-history');
          if (historyPanel && historyPanel.dataset.loaded === 'true') {
            const rows = _buildHistoryRows(newData);
            _renderHistoryMiniTable(historyPanel, rows);
            historyPanel._allRows = rows;
          }
        }
      }).catch(() => {}).finally(() => _histRefreshing.delete(code));
    }
    return stale.data;
  }
  const allHistory = await _doFetchHistory(code);
  if (!allHistory) return null;
  const f2 = funds.find(x => x.code === code);
  if (f2) f2.history = allHistory;
  setHistoryCache(code, allHistory);
  return allHistory;
}
// ============ 单日净值查询（lsjz 接口，更新快）============
function fetchFundNetValue(code, date) {
  return new Promise(resolve => {
    const sc = document.createElement('script');
    const t = setTimeout(() => { cleanup(); resolve(null); }, 10000);
    let done = false;
    function cleanup() { if (done) return; done = true; clearTimeout(t); if (sc.parentNode) sc.parentNode.removeChild(sc); }
    sc.onload = () => {
      cleanup();
      try {
        const resp = window.apidata;
        const content = resp?.content || '';
        if (content.includes('暂无数据')) { resolve(null); return; }
        const rows = content.split('<tr>');
        for (const row of rows) {
          const cells = row.match(/<td[^>]*>(.*?)<\/td>/g) || [];
          if (cells.length < 2) continue;
          const d = cells[0].replace(/<[^>]+>/g, '').trim();
          if (d !== date) continue;
          const nav = parseFloat(cells[1].replace(/<[^>]+>/g, ''));
          resolve(Number.isFinite(nav) ? nav : null);
          return;
        }
        resolve(null);
      } catch(e) { resolve(null); }
    };
    sc.onerror = () => { cleanup(); resolve(null); };
    sc.src = `https://fundf10.eastmoney.com/F10DataApi.aspx?type=lsjz&code=${code}&page=1&per=1&sdate=${date}&edate=${date}`;
    document.head.appendChild(sc);

const HOLDINGS_CACHE_KEY = 'fund_holdings_cache_v2';

function getHoldingsCache(code) {

}
function setHoldingsCache(code, data) {

// 从 F10 HTML 中提取报告期日期（照抄 fund.js L365-375）
function extractHoldingsReportDate(html) {
  if (!html) return null;
  const m1 = html.match(/(报告期|截止日期)[^0-9]{0,20}(\d{4}-\d{2}-\d{2})/);
  if (m1) return m1[2];
  const m2 = html.match(/(\d{4}-\d{2}-\d{2})/);
  return m2 ? m2[1] : null;
}
// 判断报告期是否为上一季度（照抄 fund.js L377-387，用原生 Date 替代 dayjs）
function isLastQuarterReport(reportDateStr) {
  if (!reportDateStr) return false;
  const parts = reportDateStr.split('-');
  const r = new Date(+parts[0], +parts[1] - 1, +parts[2]);
  if (isNaN(r.getTime())) return false;
  const now = new Date();
  const sixMonthsAgo = new Date(now.getFullYear(), now.getMonth() - 6, now.getDate());

// 从 HTML 中解析前10持仓（股票名称、占净值比例）
function parseHoldingsFromHtml(html) {
  if (!html || typeof html !== 'string') return null;
  // 解析 thead 找列索引（照抄 real-time-fund fund.js L654-662）
  const headerRow = (html.match(/<thead[\s\S]*?<tr[\s\S]*?<\/tr>[\s\S]*?<\/thead>/i) || [])[0] || '';
  const headerCells = (headerRow.match(/<th[\s\S]*?>([\s\S]*?)<\/th>/gi) || []).map(th => th.replace(/<[^>]*>/g, '').trim());
  let idxCode = -1, idxName = -1, idxWeight = -1;
  headerCells.forEach((h, i) => {
    const t = h.replace(/\s+/g, '');
    if (idxCode < 0 && (t.includes('股票代码') || t.includes('证券代码'))) idxCode = i;
    if (idxName < 0 && (t.includes('股票名称') || t.includes('证券名称'))) idxName = i;
    if (idxWeight < 0 && (t.includes('占净值比例') || t.includes('占比'))) idxWeight = i;
  });
  // 解析 tbody 中的行
  const rows = html.match(/<tbody[\s\S]*?<\/tbody>/i) || [];
  const dataRows = rows.length ? rows[0].match(/<tr[\s\S]*?<\/tr>/gi) || [] : html.match(/<tr[\s\S]*?<\/tr>/gi) || [];
  const holdings = [];
  for (const r of dataRows) {
    if (holdings.length >= 10) break;
    const tds = (r.match(/<td[\s\S]*?>([\s\S]*?)<\/td>/gi) || []).map(td => td.replace(/<[^>]*>/g, '').trim());
    if (!tds.length) continue;
    let hc = '', hn = '', hw = '';
    // 代码解析（照抄 fund.js L671-681）：支持6位A股、5位港股、英文代码
    if (idxCode >= 0 && tds[idxCode]) {
      const raw = String(tds[idxCode] || '').trim();
      const mA = raw.match(/(\d{6})/);
      const mHK = raw.match(/(\d{5})/);
      const mAlpha = raw.match(/\b([A-Za-z]{1,10})\b/);
      hc = mA ? mA[1] : (mHK ? mHK[1] : (mAlpha ? mAlpha[1].toUpperCase() : raw));
    } else {
      const codeIdx = tds.findIndex(txt => /^\d{6}$/.test(txt));
      if (codeIdx >= 0) hc = tds[codeIdx];
    }
    // 名称解析（照抄 fund.js L682-687）：有兜底按位置推断
    if (idxName >= 0 && tds[idxName]) {
      hn = tds[idxName];

    if (idxWeight >= 0 && tds[idxWeight]) {
      const wm = tds[idxWeight].match(/([\d.]+)\s*%/);
      hw = wm ? `${wm[1]}%` : tds[idxWeight];

      hw = wIdx >= 0 ? tds[wIdx].match(/([\d.]+)\s*%/)?.[1] + '%' : '';

    if (hc || hn || hw) {

    }
  }
  return holdings.length ? holdings : null;
}
// 股票代码 → 腾讯行情代码格式
function _normalizeTencentCode(input) {
  const raw = String(input || '').trim();
  if (!raw) return null;
  const mPref = raw.match(/^(us|hk|sh|sz|bj)(.+)$/i);
  if (mPref) {
    const p = mPref[1].toLowerCase();
    const rest = String(mPref[2] || '').trim();
    return `${p}${/^\d+$/.test(rest) ? rest : rest.toUpperCase()}`;
  }
  if (/^\d{6}$/.test(raw)) {
    const pfx = raw.startsWith('6') || raw.startsWith('9') ? 'sh' : (raw.startsWith('4') || raw.startsWith('8') ? 'bj' : 'sz');
    return `s_${pfx}${raw}`;
  }
  if (/^\d{5}$/.test(raw)) return `s_hk${raw}`;
  const mHkDot = raw.match(/^(\d{4,5})\.(?:HK)$/i);
  if (mHkDot) return `s_hk${mHkDot[1].padStart(5, '0')}`;
  if (/^[A-Za-z]{1,10}$/.test(raw)) return `us${raw.toUpperCase()}`;
  return null;
}
// 通过腾讯行情 JSONP 拉取涨跌幅（照抄 fund.js L752-805）
function enrichHoldingsWithQuotes(holdings) {
  const needQuotes = holdings
    .map(h => ({ h, tcode: _normalizeTencentCode(h.code) }))
    .filter(x => Boolean(x.tcode));
  if (!needQuotes.length) return Promise.resolve();
  const tencentCodes = needQuotes.map(x => x.tcode).join(',');
  const quoteUrl = `https://qt.gtimg.cn/q=${tencentCodes}`;
  return new Promise((resolve) => {
    const script = document.createElement('script');
    script.src = quoteUrl;
    let done = false;
    const cleanup = () => {
      done = true;
      if (timer) clearTimeout(timer);
      if (document.body.contains(script)) document.body.removeChild(script);
    };
    const timer = setTimeout(() => { if (!done) { cleanup(); resolve(); } }, 8000);
    script.onload = () => {
      if (done) return;
      needQuotes.forEach(({ h, tcode }) => {
        const varName = `v_${tcode}`;
        const dataStr = window[varName];
        if (dataStr) {
          const parts = dataStr.split('~');
          const isUS = /^us/i.test(String(tcode || ''));
          const idx = isUS ? 32 : 5;
          if (parts.length > idx) {

      cleanup();
      resolve();
    };
    script.onerror = () => { cleanup(); resolve(); };
    document.body.appendChild(script);
  });
}
async function fetchFundHoldings(code) {

    if (fund) fund._holdings = cached;

// 自定义 plugin：买卖标记 + 十字线
const _trendPlugin = {
  id: 'trendMarkersCrosshair',
  afterDraw(chart) {
    const { ctx, chartArea, scales: { x: xSc, y: ySc } } = chart;
    if (!chartArea) return;
    const { top, bottom, left, right } = chartArea;
    const isDark = document.body.classList.contains('dark');
    // 买卖标记
    if (chart._markers && chart._markers.length) {
      chart._markers.forEach(m => {
        const px = xSc.getPixelForValue(m.x);
        const py = ySc.getPixelForValue(m.y);
        if (px >= left && px <= right && py >= top && py <= bottom) {
          ctx.fillStyle = m.type === 'add' ? '#ef4444' : '#22c55e';
          ctx.beginPath(); ctx.arc(px, py, 3.5, 0, Math.PI * 2); ctx.fill();
          ctx.strokeStyle = isDark ? '#0f172a' : '#ffffff';
          ctx.lineWidth = 0.8; ctx.stroke();
        }
      });
    }
    // 十字线
    if (chart._ch && chart._ch.active) {
      const { idx } = chart._ch;
      const raw = chart._rawData;
      if (idx == null || idx < 0 || !raw || idx >= raw.length) return;
      const dataX = xSc.getPixelForValue(idx);
      const dataY = ySc.getPixelForValue(raw[idx].value);
      ctx.save();
      ctx.strokeStyle = isDark ? 'rgba(148,163,184,0.7)' : 'rgba(71,85,105,0.7)';
      ctx.lineWidth = 1.5; ctx.setLineDash([5, 3]);
      ctx.beginPath(); ctx.moveTo(dataX, top); ctx.lineTo(dataX, bottom); ctx.stroke();
      ctx.setLineDash([]);
      ctx.fillStyle = isDark ? '#f1f5f9' : '#0f172a';
      ctx.beginPath(); ctx.arc(dataX, dataY, 4, 0, Math.PI * 2); ctx.fill();
      ctx.strokeStyle = isDark ? '#1e293b' : '#fff'; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(dataX, dataY, 4, 0, Math.PI * 2); ctx.stroke();
      ctx.restore();
    }
    // 成本线（plugin 画保证在最上层）
    if (chart._costNav != null) {
      const costY = ySc.getPixelForValue(chart._costNav);
      if (costY >= top && costY <= bottom) {
        ctx.save();
        ctx.strokeStyle = isDark ? '#f59e0b' : '#d97706';
        ctx.lineWidth = 1;
        ctx.setLineDash([6, 4]);
        ctx.beginPath();
        ctx.moveTo(left, costY);
        ctx.lineTo(right, costY);
        ctx.stroke();
        ctx.restore();
      }
    }
  }
};
// 公共：趋势图数据准备（裁切、Y轴、涨跌幅、标记）
function prepareTrendData(data, period, costNav, code) {
  if (!data || !data.length) return null;
  const latestDate = data[data.length - 1].date;
  const [ly, lm, ld] = latestDate.split('-').map(Number);
  const cutoffBase = new Date(ly, lm - 1, ld);
  cutoffBase.setMonth(cutoffBase.getMonth() - period);
  const cutoffDate = formatDate(cutoffBase);
  let baseIdx = 0;
  for (let i = data.length - 1; i >= 0; i--) { if (data[i].date <= cutoffDate) { baseIdx = i; break; } }
  const baseNav = data[baseIdx]?.value || 0;
  if (baseNav <= 0) return null;
  const recent = data.slice(baseIdx).filter(d => d && d.value > 0);
  if (recent.length < 2) return null;
  const navs = recent.map(d => d.value);
  const baseVal = navs[0];
  if (!costNav || isNaN(costNav) || costNav <= 0) {
    costNav = (Math.min(...navs) + Math.max(...navs)) / 2;
  }
  const pcts = navs.map(v => ((v - baseVal) / baseVal) * 100);
  const maxAbs = Math.max(Math.abs(Math.min(...pcts)), Math.abs(Math.max(...pcts)));
  const yHalf = (maxAbs / 100) * baseVal;
  const labels = recent.map(d => d.date.slice(2));
  // 更新涨跌幅显示
  const lastPct = pcts[pcts.length - 1];
  const pctEl = document.querySelector(`.period-change[data-code="${code}"]`);
  if (pctEl) {
    const cl = lastPct >= 0 ? 'up' : 'down';
    pctEl.className = 'period-change';
    pctEl.innerHTML = `<span class="fund-label">本基金</span> <span class="fund-pct ${cl}">${lastPct >= 0 ? '+' : ''}${lastPct.toFixed(2)}%</span>`;
  }
  // 计算买卖标记
  const fund = funds.find(f => f.code === code);
  const markers = [];
  if (fund && fund.operations && fund.operations.length) {
    const ops = fund.operations.filter(op => (op.type === 'add' || op.type === 'reduce') && op.status !== 'cancelled');
    ops.forEach(op => {
      const opDateStr = op.date.slice(0, 10);
      for (let i = 0; i < recent.length; i++) {
        if (recent[i].date === opDateStr) { markers.push({ x: i, y: recent[i].value, type: op.type }); break; }
      }
    });
  }
  return { recent, navs, baseVal, yHalf, labels, costNav, markers, pcts };
}
// 创建 / 重建趋势图

  const isDark = document.body.classList.contains('dark');

// 更新已有趋势图数据（带动画过渡）
function updateTrendChart(canvas, data, period, costNav) {
  const chart = Chart.getChart(canvas);
  if (!chart || !data || !data.length) return createTrendChart(canvas, data, period, costNav);
  period = period || parseInt(canvas.dataset.period) || 1;
  const code = canvas.dataset.code;
  const pd = prepareTrendData(data, period, costNav, code);
  if (!pd) return chart;
  const { recent, navs, baseVal, yHalf, labels, costNav: cn, markers } = pd;
  chart.data.labels = labels;
  chart.data.datasets[0].data = navs;
  chart.options.scales.y.min = baseVal - yHalf;
  chart.options.scales.y.max = baseVal + yHalf;
  chart._rawData = recent;
  chart._baseVal = baseVal;
  chart._period = period;
  chart._costNav = cn;

// ---- 十字线事件处理 ----
function _updateCrosshair(canvas, clientX) {
  const chart = Chart.getChart(canvas);
  if (!chart || !chart._rawData || !chart._rawData.length) return;
  const rect = canvas.getBoundingClientRect();
  const mx = clientX - rect.left;
  const xSc = chart.scales.x;
  if (!xSc) return;
  const xVal = xSc.getValueForPixel(mx);
  const idx = Math.round(xVal);
  const raw = chart._rawData;
  if (idx < 0 || idx >= raw.length) return;
  chart._ch = { active: true, idx: idx };
  const dp = raw[idx];
  const code = canvas.dataset.code;
  const tooltip = document.getElementById('tooltip_' + code);
  if (tooltip && dp) {
    const pct = ((dp.value - chart._baseVal) / chart._baseVal) * 100;
    const dateStr = dp.date.slice(5);
    const label = `${dateStr}  ${pct >= 0 ? '+' : ''}${pct.toFixed(2)}%`;
    tooltip.textContent = label;
    const canvasRect = canvas.getBoundingClientRect();
    const parentRect = tooltip.parentElement.getBoundingClientRect();
    const offset = canvasRect.left - parentRect.left;
    let tLeft = mx + offset;
    const tw = tooltip.offsetWidth || 130;
    const cLeft = offset, cRight = offset + canvasRect.width;
    tLeft = Math.max(cLeft + tw / 2, Math.min(cRight - tw / 2, tLeft));
    tooltip.style.left = tLeft + 'px';
    tooltip.classList.add('visible');
  }
  chart.draw();
}
function _clearCrosshair(canvas) {
  const chart = Chart.getChart(canvas);
  if (chart) { chart._ch = { active: false }; chart.draw(); }
  const code = canvas.dataset.code;
  const tooltip = document.getElementById('tooltip_' + code);
  if (tooltip) tooltip.classList.remove('visible');
}
function _onTrendMouseMove(e) {
  const canvas = e.currentTarget;
  canvas._touchActive = false;
  _updateCrosshair(canvas, e.clientX);
}
function _onTrendMouseLeave(e) {
  _clearCrosshair(e.currentTarget);
}
function _noopClick(e) { e.stopPropagation(); }
function _onTrendTouchStart(e) {
  e.preventDefault();
  const canvas = e.currentTarget;
  canvas._touchActive = true;
  if (e.touches[0]) _updateCrosshair(canvas, e.touches[0].clientX);
}
function _onTrendTouchMove(e) {
  e.preventDefault();
  const canvas = e.currentTarget;
  if (!canvas._touchActive) return;
  if (e.touches[0]) _updateCrosshair(canvas, e.touches[0].clientX);
}
function _onTrendTouchEnd(e) {
  e.preventDefault();
  const canvas = e.currentTarget;
  canvas._touchActive = false;
  setTimeout(() => { if (!canvas._touchActive) _clearCrosshair(canvas); }, 1500);
}

function fetchIndices(){
  if(!selectedIndices.length) return;
  // 构建代码映射和备选格式（美股需要多种格式尝试）
  const codeMap = {}; // tencentCode -> originalCode
  const altMap = {};  // originalCode -> [altTencentCodes]
  selectedIndices.forEach(code => {
    const info = allIndices.find(i => i.code === code);
    if (info) {
      codeMap[info.tencent] = code;
      // 美股添加备选格式
      if (code.startsWith('us')) {
        const suffix = code.slice(2).toLowerCase();
        const alts = ['us_' + suffix, 'gb_' + suffix, code];
        altMap[code] = alts;
        alts.forEach(alt => { if (!codeMap[alt]) codeMap[alt] = code; });
      }
    }
  });
  const codes = Object.keys(codeMap).join(',');
  const sc = document.createElement('script');
  sc.src = `https://qt.gtimg.cn/q=${codes}`;
  var timeout = setTimeout(function() {
    if (sc.parentNode) sc.parentNode.removeChild(sc);
  }, XHR_TIMEOUT);
  sc.onload = function() {
    clearTimeout(timeout);
    Object.keys(codeMap).forEach(function(tcode) {
      var code = codeMap[tcode];
      if (indexDataCache[code] && indexDataCache[code].price > 0) return;
      var key = 'v_' + tcode;
      var raw = window[key];
      if (raw && typeof raw === 'string') {
        var parts = raw.split('~');
        if (parts.length >= 5) {
          var name = parts[1], price = parseFloat(parts[3]), prev = parseFloat(parts[4]);
          var open = parts.length > 5 ? (parseFloat(parts[5]) || 0) : 0;
          var high = parts.length > 33 ? (parseFloat(parts[33]) || 0) : 0;
          var low = parts.length > 34 ? (parseFloat(parts[34]) || 0) : 0;
          var vol = parts.length > 36 ? (parseFloat(parts[36]) || 0) : 0;
          if (!isNaN(price) && !isNaN(prev) && price > 0) {
            var chg = ((price - prev) / prev * 100);
            indexDataCache[code] = { name: name, price: price, prev: prev, chg: chg, open: open, high: high, low: low, vol: vol };
          }
        }
      }
    });
    renderIndices();
    if (sc.parentNode) sc.parentNode.removeChild(sc);
  };
  sc.onerror = function() { clearTimeout(timeout); if (sc.parentNode) sc.parentNode.removeChild(sc); };
  document.head.appendChild(sc);
}

// ============ 核心计算逻辑（官方标准公式）============
function isMarketOpenNow(fund) {
  const fsrq = fund.jzrq || '';
  const vJzrq = fund._valuationJzrq || '';
  // 特殊需求：只比日期判断开盘，不检查实际交易时段（9:30-15:00）
  // fsrq == vJzrq 为盘中，其他情况为盘后（QDII 和非 QDII 相同逻辑）
  return (fsrq !== '' && vJzrq !== '' && fsrq === vJzrq);
}
function calcTodayProfit(fund, isMarketOpen=true) {
  const shares = (fund.shares || 0);
  const dwjz = parseFloat(fund.dwjz) || 0;
  const prevDwjz = parseFloat(fund._prevDwjz) || 0;
  const gsz = parseFloat(fund.gsz) || 0;
  if (shares > 0 && prevDwjz > 0) {
    // 当日买入份额不参与当日收益，当日卖出份额仍参与当日涨跌
    const today = todayStr();
    let buyToday = 0, sellToday = 0;
    for (const op of (fund.operations || [])) {
      if (op.date !== today || op.status !== 'confirmed') continue;
      const s = op.confirmShares || 0;
      if (s <= 0) continue;
      if (op.type === 'add') buyToday += s;
      else if (op.type === 'reduce') sellToday += s;
    }
    const shareForProfit = Math.max(0, shares - buyToday + sellToday);
    if (isMarketOpen && gsz > 0 && Math.abs(gsz - prevDwjz) > 0.0001) {
      return r2(shareForProfit * (gsz - prevDwjz));
    }
    return r2(shareForProfit * (dwjz - prevDwjz));
  }
  return 0;
}
function calcDisplayProfit(fund, isMarketOpen=true) {
  const base = (fund.totalProfit !== null && fund.totalProfit !== undefined) ? fund.totalProfit : 0;
  return base + calcTodayProfit(fund, isMarketOpen);
}
function calcDisplayRate(profit, amount) {
  if (profit === null || amount <= 0) return null;
  return profit / amount * 100;
}
function calcMarketValue(fund) {
  const shares = (fund.shares || 0);
  const nav = parseFloat(fund.dwjz) || parseFloat(fund.gsz) || 0;
  if (shares > 0 && nav > 0) {
    const cost = Number(fund.cost) || 0;
    const profit = cost > 0 ? r2((nav - cost) * shares) : 0;
    const marketVal = r2(shares * nav);
    return { marketVal, profit, amount: r2(cost * shares), calculated: true };
  }
  return { marketVal: fund.amount || 0, profit: 0, amount: fund.amount || 0, calculated: false };
}
function applyMarketValue(fund) {
  const r = calcMarketValue(fund);
  if (r.calculated) {
    fund.totalProfit = r.profit;
    fund._origMarketVal = r.marketVal;
    fund.amount = r.amount;
    fund._tnCalculated = true;
  }
  return r.marketVal;
}
function getMarketValue(fund) {
  return calcMarketValue(fund).marketVal;
}

// ============ 操作记录与交易日工具 ============
function generateId() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
}
// 创建操作记录
function createOperation(type, date, timeType, amount, isMoney) {
  return {
    id: generateId(),
    type, // 'add' | 'reduce'
    date, // 用户选择的日期
    timeType, // 'before3' | 'after3'
    amount, // 金额或份额
    isMoney, // true=按金额, false=按份额
    confirmDate: null, // 计算后填写
    confirmNav: null,
    confirmShares: null,
    status: 'pending', // 'pending' | 'confirmed' | 'cancelled'
    createdAt: new Date().toISOString()
  };
}
// 为基金添加操作记录
async function addFundOperation(code, type, date, timeType, amount, isMoney) {
  const fund = funds.find(f => f.code === code);
  if (!fund) return null;
  const op = createOperation(type, date, timeType, amount, isMoney);
  const dd = new Date(date);
  if (timeType === 'after3') dd.setDate(dd.getDate() + 1);
  op.confirmDate = formatDate(dd);
  fund.operations = fund.operations || [];
  fund.operations.push(op);
  saveFunds();
  await confirmSingleOp(fund, op);
  if (op.status === 'confirmed') { saveFunds(); renderFunds(); }
  return op;
}
async function confirmSingleOp(fund, op) {
  if (op.status !== 'pending' || !op.confirmDate) return;
  const result = await fetchSmartNetValue(fund.code, op.confirmDate);
  if (result && result.value > 0) {
    op.confirmNav = result.value;
    op.confirmDate = result.date;
    const nav = result.value;
    if (op.type === 'add') {
      const buyShares = op.amount / nav;
      op.confirmShares = buyShares;
      const oldShare = fund.shares || 0;
      const oldAmount = fund.amount || 0;
      const newShare = oldShare + buyShares;
      const newAmount = oldAmount + op.amount;
      fund.amount = r2(newAmount);
      fund.cost = newShare > 0 ? (newAmount / newShare) : 0;
      fund.shares = newShare;
    } else if (op.type === 'reduce') {
      const sellShares = op.isMoney ? (op.amount / nav) : op.amount;
      op.confirmShares = sellShares;
      const oldShare = fund.shares || 0;
      fund.shares = Math.max(0, oldShare - sellShares);
      if (fund.shares <= 0) { fund.cost = 0; fund.amount = 0; }
      else {
        const oldCost = Number(fund.cost) || 0;
        fund.amount = r2(oldCost * fund.shares);
      }
    }
    op.status = 'confirmed';
  }
}
// 检查并自动确认待处理的操作
async function checkPendingOperations() {
  let confirmedCount = 0;
  for (const fund of funds) {
    if (!fund.operations || !fund.operations.length) continue;
    const pendingOps = fund.operations.filter(op => op.status === 'pending');
    if (!pendingOps.length) continue;
    for (const op of pendingOps) {
      await confirmSingleOp(fund, op);
      if (op.status === 'confirmed') confirmedCount++;
    }
  }
  if (confirmedCount > 0) {
    saveFunds();
    renderFunds();
    showToast(`${confirmedCount}笔操作已自动确认`, 'success');
  }
  return confirmedCount;
}
// 撤回操作（pending直接删除；confirmed仅标记，不影响持仓）
function cancelOperation(code, opId) {
  const fund = funds.find(f => f.code === code);
  if (!fund?.operations) return false;
  const idx = fund.operations.findIndex(op => op.id === opId);
  if (idx < 0) return false;
  if (fund.operations[idx].status === 'pending') fund.operations.splice(idx, 1);
  else fund.operations[idx].status = 'cancelled';
  saveFunds();
  return true;
}
// 删除操作记录（永久删除，不影响持仓）
function deleteOperation(code, opId) {
  const fund = funds.find(f => f.code === code);
  if (!fund?.operations) return false;
  const idx = fund.operations.findIndex(op => op.id === opId);
  if (idx < 0) return false;
  fund.operations.splice(idx, 1);
  saveFunds();
  return true;
}

// 获取可用份额（扣除待确认减仓）
function getAvailableShares(fund) {
  if (!fund) return 0;
  let shares = fund.shares || 0;
  const ops = fund.operations || [];
  for (const op of ops) {
    if (op.status === 'pending' && op.type === 'reduce') {
      if (op.isMoney) continue;
      shares -= (op.amount || 0);
    }
  }
  return Math.max(0, shares);
}

function setReduceShares(code, ratio, btn) {
  const fund = funds.find(f => f.code === code);
  if (!fund) return;
  const shares = getAvailableShares(fund);
  const input = document.getElementById('reduceShares_' + code);
  if (!input) return;
  if (shares <= 0) { showToast('没有可卖出的份额', 'error'); return; }
  if (ratio >= 1) {
    input.value = shares.toFixed(2);
  } else {
    input.value = (shares * ratio).toFixed(2);
  }
  // 切换激活状态
  if (btn) {
    btn.parentElement.querySelectorAll('.btn-secondary').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');

function _submitTrade(code, type) {
  const isAdd = type === 'add';
  const amountInput = document.getElementById(isAdd ? ('addAmount_' + code) : ('reduceShares_' + code));
  const dateInput = document.getElementById('addDate_' + code);
  const v = parseFloat(amountInput?.value);
  if (isNaN(v) || v <= 0) { showToast(isAdd ? '请输入有效金额' : '请输入有效份额', 'error'); return; }
  const date = dateInput?.value;
  if (!date) { showToast('请选择日期', 'error'); return; }
  const fund = funds.find(f => f.code === code);
  if (!isAdd && fund && v > getAvailableShares(fund)) { showToast('卖出份额超出可用份额', 'error'); return; }
  const timeType = _tradeTimeType[code] || 'before3';
  const fundName = fund?.name || code;
  const timeLabel = timeType === 'before3' ? '3点前' : '3点后';
  const label = isAdd ? '加仓' : '减仓';
  const unit = isAdd ? '元' : '份';
  showConfirm(`确认${label} ${fundName}\n${isAdd ? '金额' : '份额'}：${v}${unit}\n日期：${date.slice(2)} · ${timeLabel}`, async () => {
    await submitTradeRaw(code, type, date, timeType, v, isAdd);
    amountInput.value = '';
    renderTradeOpList(code, isAdd ? 'addOpList' : 'reduceOpList');
  });
}
